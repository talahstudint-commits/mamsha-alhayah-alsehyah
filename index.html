
<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ممشى الحياة الصحية</title>

<style>
:root{
--primary:#10b981;
--dark:#0f172a;
--text:#1e293b;
--muted:#64748b;
--bg:#f8fafc;
--white:#ffffff;
--blue:#3b82f6;
--red:#ef4444;
--orange:#f59e0b;
--purple:#8b5cf6;
}

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Tahoma,sans-serif;
background:linear-gradient(180deg,#f8fafc,#eef7f3);
color:var(--text);
padding:20px;
}

.container{
max-width:700px;
margin:auto;
}

.card{
background:#fff;
padding:28px;
border-radius:24px;
box-shadow:0 15px 35px rgba(0,0,0,.06);
}

h1{
font-size:30px;
margin-bottom:10px;
color:#059669;
}

h2{
font-size:26px;
margin-bottom:14px;
color:#059669;
}

p{
color:var(--muted);
line-height:1.8;
margin-bottom:18px;
}

.grid{
display:grid;
gap:14px;
margin-top:25px;
}

.btn{
display:block;
text-decoration:none;
padding:16px;
border-radius:16px;
font-weight:800;
text-align:center;
font-size:16px;
color:#fff;
transition:.2s;
}

.btn:hover{
transform:translateY(-3px);
}

.green{background:#10b981;}
.blue{background:#3b82f6;}
.red{background:#ef4444;}
.orange{background:#f59e0b;}
.purple{background:#8b5cf6;}

.back{
margin-top:18px;
display:inline-block;
text-decoration:none;
background:#e2e8f0;
color:#111827;
padding:12px 18px;
border-radius:14px;
font-weight:700;
}

ul{
padding-right:20px;
margin-top:10px;
}

li{
margin-bottom:10px;
line-height:1.8;
}

table{
width:100%;
margin-top:18px;
border-collapse:collapse;
overflow:hidden;
border-radius:14px;
}

th,td{
padding:12px;
text-align:center;
border-bottom:1px solid #e5e7eb;
}

th{
background:#10b981;
color:#fff;
}

input{
width:100%;
padding:14px;
margin-bottom:12px;
border-radius:14px;
border:1px solid #dbe2ea;
font-size:15px;
}

button{
width:100%;
padding:14px;
border:none;
border-radius:14px;
background:#10b981;
color:#fff;
font-size:15px;
font-weight:800;
cursor:pointer;
}

.result{
margin-top:12px;
background:#ecfdf5;
padding:14px;
border-radius:14px;
font-weight:800;
text-align:center;
}

.small{
font-size:13px;
margin-top:10px;
}

</style>
</head>
<body>
<div class="container">
<div class="card">

<h1>ممشى الحياة الصحية</h1>


<div class="grid">
<a href="bmi.html" class="btn blue">حساب BMI</a>
<a href="aid.html" class="btn red">الإسعافات الأولية</a>
<a href="steps.html" class="btn orange">السعرات والخطوات</a>
<a href="tips.html" class="btn purple">نصائح صحية</a>
</div>


</div>
</div>
</body>
</html>
