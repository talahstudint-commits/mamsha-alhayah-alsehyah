<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>السعرات والخطوات</title>

<style>
body{
font-family:Tahoma;
background:#fff7ed;
padding:25px;
}

.box{
max-width:650px;
margin:auto;
background:#fff;
padding:30px;
border-radius:22px;
box-shadow:0 12px 25px rgba(0,0,0,.08);
}

h1{
text-align:center;
color:#f59e0b;
margin-bottom:10px;
}

p{
text-align:center;
color:#64748b;
margin-bottom:20px;
}

.card{
background:#fff7ed;
padding:15px;
border-radius:14px;
margin-bottom:12px;
border-right:5px solid #f59e0b;
}

.card h3{
margin-bottom:6px;
color:#b45309;
font-size:16px;
}

.card p{
margin:0;
color:#334155;
font-size:14px;
text-align:right;
}

input{
width:100%;
padding:14px;
margin-bottom:12px;
border-radius:14px;
border:1px solid #fed7aa;
font-size:15px;
}

button{
width:100%;
padding:14px;
border:none;
background:#f59e0b;
color:white;
font-size:16px;
font-weight:bold;
border-radius:14px;
cursor:pointer;
}

button:hover{
background:#d97706;
}

.result{
margin-top:14px;
padding:14px;
background:#ffedd5;
border-radius:14px;
text-align:center;
font-weight:bold;
}

.back{
display:block;
margin-top:20px;
text-align:center;
text-decoration:none;
background:#e2e8f0;
padding:12px;
border-radius:14px;
color:#111827;
font-weight:bold;
}
</style>
</head>

<body>

<div class="box">

<h1>السعرات والخطوات</h1>
<p>معلومات تقريبية عن المشي اليومي</p>

<div class="card">
<h3>1000 خطوة</h3>
<p>تحرق تقريبًا 40 - 50 سعرة حرارية</p>
</div>

<div class="card">
<h3>10,000 خطوة</h3>
<p>تساوي تقريبًا 7 - 8 كم مشي</p>
</div>

<div class="card">
<h3>فوائد المشي</h3>
<p>يحسن القلب، يساعد على حرق الدهون، ويقلل التوتر</p>
</div>

<h3 style="text-align:center;color:#f59e0b;margin-top:20px;">
احسب خطواتك
</h3>

<input type="number" id="steps" placeholder="أدخل عدد الخطوات">

<button onclick="calc()">احسب السعرات</button>

<div class="result" id="result">
النتيجة ستظهر هنا
</div>

<a href="index.html" class="back">العودة للرئيسية</a>

</div>

<script>
function calc(){

let steps = document.getElementById("steps").value;

if(steps){

let calories = (steps * 0.045).toFixed(0);

document.getElementById("result").innerHTML =
"تحرق تقريبًا " + calories + " سعرة حرارية";

}

}
</script>

</body>
</html>
